<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle de Perícias</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>
  <div class="container">
    <div id="homeView">
      <div class="topbar">
        <h1>Controle de Perícias por Mês</h1>
      </div>

      <div class="form-box">
        <h3>Criar pasta do mês</h3>
        <div class="form-grid">
          <div>
            <label for="novoMes">Mês/Ano</label>
            <input type="month" id="novoMes">
          </div>
        </div>
        <div class="acoes-topo">
          <button class="btn-success" onclick="criarMes()">Criar Pasta do Mês</button>
        </div>
      </div>

      <div class="lista-box">
        <h3>Meses cadastrados</h3>
        <div id="listaMeses" class="grid"></div>
      </div>
    </div>

    <div id="mesView" class="hidden">
      <div class="topbar">
        <button class="btn-secondary" onclick="voltarHome()">← Voltar para os meses</button>
        <h2 id="tituloMes"></h2>
      </div>

      <div class="form-box">
        <h3 id="tituloFormulario">Cadastrar Perícia</h3>

        <div class="form-grid">
          <div>
            <label for="nome">Nome do cliente</label>
            <input type="text" id="nome" placeholder="Nome do cliente">
          </div>

          <div>
            <label for="tipoPericia">Tipo de perícia</label>
            <select id="tipoPericia">
              <option value="">Selecione</option>
              <option value="Médica">Médica</option>
              <option value="Social">Social</option>
              <option value="Trabalhista">Trabalhista</option>
              <option value="Contábil">Contábil</option>
              <option value="Psicológica">Psicológica</option>
              <option value="Outra">Outra</option>
            </select>
          </div>

          <div>
            <label for="naturezaCaso">Natureza do caso</label>
            <select id="naturezaCaso">
              <option value="">Selecione</option>
              <option value="Judicial">Judicial</option>
              <option value="Administrativo">Administrativo</option>
              <option value="Outro">Outro</option>
            </select>
          </div>

          <div>
            <label for="audiencia">Data e hora da audiência</label>
            <input type="datetime-local" id="audiencia">
          </div>

          <div>
            <label for="pericia">Data e hora da perícia</label>
            <input type="datetime-local" id="pericia">
          </div>

          <div>
            <label for="processo">Número do processo/protocolo</label>
            <input type="text" id="processo" placeholder="Opcional">
          </div>

          <div class="col-span-2">
            <label for="localPericia">Local da perícia</label>
            <input type="text" id="localPericia" placeholder="Ex.: Agência da Previdência Social Fortaleza - Sul, endereço completo">
          </div>
        </div>

        <div class="form-area">
          <label for="observacoes">Observações</label>
          <textarea id="observacoes" placeholder="Anotações adicionais"></textarea>
        </div>

        <div class="acoes-topo">
          <button id="btnSalvar" onclick="salvarPericia()">Salvar Perícia</button>
          <button class="btn-secondary" onclick="cancelarEdicao()">Limpar</button>
        </div>

        <div class="muted aviso-pdf">
          Para gerar o comunicado em PDF, deixe o arquivo <strong>modelo-comunicado.pdf</strong> na mesma pasta publicada do site.
        </div>
      </div>

      <div class="lista-box">
        <div class="topbar topbar-interno">
          <h3>Painel de perícias do mês</h3>
          <div class="acoes-topo sem-margem">
            <button class="btn-secondary" onclick="alternarVisualizacao()" id="btnVisualizacao">Modo cards</button>
          </div>
        </div>

        <div class="filtros-grid">
          <div>
            <label for="busca">Buscar</label>
            <input type="text" id="busca" placeholder="Buscar por nome, processo, tipo..." oninput="renderPericias()">
          </div>
          <div>
            <label for="filtroTipo">Filtrar por tipo</label>
            <select id="filtroTipo" onchange="renderPericias()">
              <option value="">Todos</option>
              <option value="Médica">Médica</option>
              <option value="Social">Social</option>
              <option value="Trabalhista">Trabalhista</option>
              <option value="Contábil">Contábil</option>
              <option value="Psicológica">Psicológica</option>
              <option value="Outra">Outra</option>
            </select>
          </div>
          <div>
            <label for="filtroNatureza">Filtrar por natureza</label>
            <select id="filtroNatureza" onchange="renderPericias()">
              <option value="">Todos</option>
              <option value="Judicial">Judicial</option>
              <option value="Administrativo">Administrativo</option>
              <option value="Outro">Outro</option>
            </select>
          </div>
        </div>

        <div class="resumo-box" id="resumoMes"></div>

        <div id="tabelaView">
          <div class="tabela-wrap">
            <table>
              <thead>
                <tr>
                  <th>Cliente</th>
                  <th>Tipo</th>
                  <th>Natureza</th>
                  <th>Processo</th>
                  <th>Perícia</th>
                  <th>Audiência</th>
                  <th>Status</th>
                  <th>Controles</th>
                  <th>Ações</th>
                </tr>
              </thead>
              <tbody id="listaTabelaPericias"></tbody>
            </table>
          </div>
        </div>

        <div id="cardsView" class="hidden">
          <div id="listaPericias"></div>
        </div>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
